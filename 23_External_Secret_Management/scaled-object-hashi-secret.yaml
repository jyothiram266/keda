apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: vault-trigger-auth
  namespace: default
spec:
  hashiCorpVault:
    address: "http://vault.vault.svc.cluster.local:8200"
    authentication: token
    credential:
      token: "root"
    secrets:
    - parameter: "host"
      key: "host"
      path: "secret/data/rabbitmq"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: keda-rabbitmq
spec:
  scaleTargetRef:
    name: consumer-program
  triggers:
  - type: rabbitmq
    metadata:
      protocol: amqp
      queueName: testqueue
      queueLength: "5"
    authenticationRef:
      name: vault-trigger-auth
